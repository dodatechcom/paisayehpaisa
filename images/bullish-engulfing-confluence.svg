<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" width="760" height="360">
  <defs>
    <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0L0 0 0 40" fill="none" stroke="#2a2d35" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="760" height="360" fill="#1a1d23" rx="8"/>

  <text x="380" y="24" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">Bullish Engulfing Near Key Support — Stronger Signal</text>

  <!-- Chart area -->
  <rect x="55" y="34" width="655" height="200" fill="url(#grid2)" rx="4"/>

  <!-- Price labels -->
  <text x="48" y="46" fill="#64748b" font-size="9" text-anchor="end">1.1200</text>
  <text x="48" y="100" fill="#64748b" font-size="9" text-anchor="end">1.1100</text>
  <text x="48" y="154" fill="#64748b" font-size="9" text-anchor="end">1.1000</text>
  <text x="48" y="220" fill="#64748b" font-size="9" text-anchor="end">1.0900</text>

  <line x1="55" y1="53" x2="710" y2="53" stroke="#2a2d35" stroke-width="0.5"/>
  <line x1="55" y1="107" x2="710" y2="107" stroke="#2a2d35" stroke-width="0.5"/>
  <line x1="55" y1="161" x2="710" y2="161" stroke="#2a2d35" stroke-width="0.5"/>
  <line x1="55" y1="215" x2="710" y2="215" stroke="#2a2d35" stroke-width="0.5"/>

  <!-- Candle 1 — bearish -->
  <line x1="120" y1="90" x2="120" y2="135" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="104" y="98" width="32" height="25" fill="#ef4444" rx="1"/>

  <!-- Candle 2 — bearish -->
  <line x1="200" y1="110" x2="200" y2="155" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="184" y="120" width="32" height="23" fill="#ef4444" rx="1"/>

  <!-- Candle 3 — bearish -->
  <line x1="280" y1="130" x2="280" y2="175" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="264" y="140" width="32" height="23" fill="#ef4444" rx="1"/>

  <!-- Candle 4 — small bearish (being engulfed) -->
  <line x1="360" y1="155" x2="360" y2="192" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="344" y="163" width="32" height="15" fill="#ef4444" rx="1"/>

  <!-- Candle 5 — large bullish (engulfing) -->
  <line x1="440" y1="98" x2="440" y2="225" stroke="#22c55e" stroke-width="2"/>
  <rect x="422" y="105" width="36" height="85" fill="#22c55e" rx="1"/>

  <!-- Candle 6 — bullish follow-through -->
  <line x1="520" y1="88" x2="520" y2="140" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="504" y="95" width="32" height="30" fill="#22c55e" rx="1"/>

  <!-- Candle 7 — bullish -->
  <line x1="600" y1="70" x2="600" y2="118" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="584" y="76" width="32" height="28" fill="#22c55e" rx="1"/>

  <!-- Support line -->
  <line x1="55" y1="195" x2="710" y2="195" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="715" y="198" fill="#f59e0b" font-size="9" font-weight="600">Key Support Level</text>

  <!-- Highlight box around pattern -->
  <rect x="335" y="90" width="130" height="155" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" rx="4"/>
  <text x="400" y="104" fill="#f59e0b" font-size="10" font-weight="600" text-anchor="middle">Bullish Engulfing</text>

  <!-- Confluence callouts (right side) -->
  <text x="630" y="240" fill="#22c55e" font-size="11" font-weight="700" text-anchor="middle">Why This Setup Is Strong</text>

  <circle cx="640" cy="258" r="4" fill="#22c55e"/>
  <text x="650" y="261" fill="#94a3b8" font-size="9">Pattern formed at known support level</text>

  <circle cx="640" cy="276" r="4" fill="#22c55e"/>
  <text x="650" y="279" fill="#94a3b8" font-size="9">Price respected the level (did not break through)</text>

  <circle cx="640" cy="294" r="4" fill="#22c55e"/>
  <text x="650" y="297" fill="#94a3b8" font-size="9">Follow-through green candle confirms buyers</text>

  <circle cx="640" cy="312" r="4" fill="#22c55e"/>
  <text x="650" y="315" fill="#94a3b8" font-size="9">Larger green body = stronger buying pressure</text>

  <!-- Educational box at bottom -->
  <rect x="40" y="325" width="680" height="28" fill="#f59e0b" fill-opacity="0.06" stroke="#f59e0b" stroke-width="0.5" rx="4"/>
  <text x="380" y="343" fill="#fbbf24" font-size="10" text-anchor="middle">💡 More confirming factors = higher probability trade. Support + Engulfing + Follow-through = strong reversal signal.</text>
</svg>
