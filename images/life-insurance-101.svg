<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" width="760" height="480">
  <rect width="760" height="480" fill="#1a1d23" rx="8"/>
  <text x="380" y="26" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">Life Insurance: Term vs Whole Life</text>

  <!-- Term Life box -->
  <rect x="40" y="50" width="330" height="210" fill="#1e293b" rx="8"/>
  <rect x="40" y="50" width="330" height="36" fill="#6366f1" rx="8"/>
  <rect x="40" y="78" width="330" height="8" fill="#6366f1"/>
  <text x="205" y="73" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">Term Life Insurance</text>

  <text x="60" y="108" fill="#94a3b8" font-size="11">Coverage period</text>
  <text x="60" y="125" fill="#e2e8f0" font-size="13" font-weight="600">10, 20, or 30 years (fixed term)</text>

  <text x="60" y="153" fill="#94a3b8" font-size="11">Payout</text>
  <text x="60" y="170" fill="#e2e8f0" font-size="13" font-weight="600">Only if you die within the term</text>

  <text x="60" y="198" fill="#94a3b8" font-size="11">Cash value</text>
  <text x="60" y="215" fill="#e2e8f0" font-size="13" font-weight="600">None — pure protection</text>

  <text x="60" y="243" fill="#94a3b8" font-size="11">Typical monthly cost (age 30)</text>
  <text x="60" y="260" fill="#22c55e" font-size="18" font-weight="700">$25 – $50</text>

  <!-- Whole Life box -->
  <rect x="390" y="50" width="330" height="210" fill="#1e293b" rx="8"/>
  <rect x="390" y="50" width="330" height="36" fill="#f59e0b" rx="8"/>
  <rect x="390" y="78" width="330" height="8" fill="#f59e0b"/>
  <text x="555" y="73" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">Whole Life Insurance</text>

  <text x="410" y="108" fill="#94a3b8" font-size="11">Coverage period</text>
  <text x="410" y="125" fill="#e2e8f0" font-size="13" font-weight="600">Your entire lifetime</text>

  <text x="410" y="153" fill="#94a3b8" font-size="11">Payout</text>
  <text x="410" y="170" fill="#e2e8f0" font-size="13" font-weight="600">Always — whenever you die</text>

  <text x="410" y="198" fill="#94a3b8" font-size="11">Cash value</text>
  <text x="410" y="215" fill="#e2e8f0" font-size="13" font-weight="600">Builds tax-deferred savings</text>

  <text x="410" y="243" fill="#94a3b8" font-size="11">Typical monthly cost (age 30)</text>
  <text x="410" y="260" fill="#ef4444" font-size="18" font-weight="700">$200 – $500</text>

  <!-- Vs badge -->
  <rect x="355" y="125" width="50" height="50" fill="#1a1d23" stroke="#6366f1" stroke-width="2" rx="25"/>
  <text x="380" y="156" fill="#e2e8f0" font-size="14" font-weight="700" text-anchor="middle">VS</text>

  <!-- Bottom comparison table -->
  <rect x="40" y="280" width="680" height="185" fill="#1e293b" rx="6"/>

  <text x="205" y="305" fill="#6366f1" font-size="13" font-weight="700" text-anchor="middle">Term Life</text>
  <text x="380" y="305" fill="#64748b" font-size="13" text-anchor="middle">vs</text>
  <text x="555" y="305" fill="#f59e0b" font-size="13" font-weight="700" text-anchor="middle">Whole Life</text>

  <line x1="60" y1="316" x2="700" y2="316" stroke="#2a2d35" stroke-width="0.5"/>

  <text x="80" y="338" fill="#94a3b8" font-size="11">Best for</text>
  <text x="205" y="338" fill="#e2e8f0" font-size="12" text-anchor="middle">Covering dependents, mortgage, income</text>
  <text x="555" y="338" fill="#e2e8f0" font-size="12" text-anchor="middle">Estate planning,永久 coverage</text>

  <text x="80" y="366" fill="#94a3b8" font-size="11">Premium trend</text>
  <text x="205" y="366" fill="#22c55e" font-size="12" text-anchor="middle">Fixed for the term</text>
  <text x="555" y="366" fill="#ef4444" font-size="12" text-anchor="middle">Fixed but much higher</text>

  <text x="80" y="394" fill="#94a3b8" font-size="11">Investment component</text>
  <text x="205" y="394" fill="#94a3b8" font-size="12" text-anchor="middle">None</text>
  <text x="555" y="394" fill="#e2e8f0" font-size="12" text-anchor="middle">Builds cash value (tax-deferred)</text>

  <text x="80" y="422" fill="#94a3b8" font-size="11">Examples</text>
  <text x="205" y="422" fill="#e2e8f0" font-size="11" text-anchor="middle">Prudential, Legal &amp; General, Manulife</text>
  <text x="555" y="422" fill="#e2e8f0" font-size="11" text-anchor="middle">MetLife, Sun Life, LV=</text>

  <!-- Legend -->
  <text x="380" y="463" fill="#64748b" font-size="10" text-anchor="middle">Term life is for protection. Whole life is for protection + savings — at 5-10x the cost.</text>
</svg>
