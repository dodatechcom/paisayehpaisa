<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" width="760" height="480">
  <rect width="760" height="480" fill="#1a1d23" rx="8"/>
  <text x="380" y="26" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">Investing in Your 20s: Start Early, Retire Rich</text>

  <!-- Power of time -->
  <rect x="40" y="45" width="340" height="210" fill="#1e293b" rx="6"/>
  <text x="210" y="68" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">The Power of Starting at 25</text>

  <text x="60" y="95" fill="#22c55e" font-size="10" font-weight="600">Invest $500/month from age 25-65</text>
  <text x="60" y="112" fill="#94a3b8" font-size="9">10% return (S&P 500 average)</text>

  <rect x="60" y="125" width="300" height="115" fill="#1a1d23" rx="4"/>
  <text x="80" y="148" fill="#94a3b8" font-size="9">By age 35: $102,000</text>
  <text x="80" y="165" fill="#94a3b8" font-size="9">By age 45: $379,000</text>
  <text x="80" y="182" fill="#94a3b8" font-size="9">By age 55: $1,023,000</text>
  <text x="80" y="199" fill="#94a3b8" font-size="9">By age 65: $2,610,000</text>
  <text x="80" y="220" fill="#22c55e" font-size="10" font-weight="700">Total: $2.6M from $240K invested</text>

  <!-- If you wait -->
  <rect x="400" y="45" width="320" height="210" fill="#1e293b" rx="6"/>
  <text x="560" y="68" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">What If You Wait Until 35?</text>

  <text x="420" y="95" fill="#ef4444" font-size="10" font-weight="600">Invest $500/month from age 35-65</text>
  <text x="420" y="112" fill="#94a3b8" font-size="9">Same 10% return, 10 fewer years</text>

  <rect x="420" y="125" width="280" height="115" fill="#1a1d23" rx="4"/>
  <text x="440" y="148" fill="#94a3b8" font-size="9">By age 45: $102,000</text>
  <text x="440" y="165" fill="#94a3b8" font-size="9">By age 55: $379,000</text>
  <text x="440" y="182" fill="#94a3b8" font-size="9">By age 65: $1,023,000</text>
  <text x="440" y="220" fill="#ef4444" font-size="10" font-weight="700">You lose $1.58M by waiting 10 years</text>

  <!-- What to invest in -->
  <rect x="40" y="270" width="680" height="195" fill="#1e293b" rx="6"/>
  <text x="380" y="295" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">Your 20s Investment Portfolio</text>

  <rect x="60" y="315" width="200" height="135" fill="#1a1d23" rx="4"/>
  <text x="160" y="335" fill="#22c55e" font-size="10" font-weight="700" text-anchor="middle">Aggressive (Recommended)</text>
  <text x="70" y="358" fill="#94a3b8" font-size="9">80% VTI (U.S. stocks)</text>
  <text x="70" y="375" fill="#94a3b8" font-size="9">15% VXUS (International)</text>
  <text x="70" y="392" fill="#94a3b8" font-size="9">5% BND (Bonds)</text>
  <text x="70" y="412" fill="#22c55e" font-size="9" font-weight="600">Expected: 10-12%/year</text>

  <rect x="280" y="315" width="200" height="135" fill="#1a1d23" rx="4"/>
  <text x="380" y="335" fill="#f59e0b" font-size="10" font-weight="700" text-anchor="middle">Moderate</text>
  <text x="290" y="358" fill="#94a3b8" font-size="9">65% VTI (U.S. stocks)</text>
  <text x="290" y="375" fill="#94a3b8" font-size="9">15% VXUS (International)</text>
  <text x="290" y="392" fill="#94a3b8" font-size="9">20% BND (Bonds)</text>
  <text x="290" y="412" fill="#f59e0b" font-size="9" font-weight="600">Expected: 8-10%/year</text>

  <rect x="500" y="315" width="200" height="135" fill="#1a1d23" rx="4"/>
  <text x="600" y="335" fill="#6366f1" font-size="10" font-weight="700" text-anchor="middle">Conservative</text>
  <text x="510" y="358" fill="#94a3b8" font-size="9">50% VTI (U.S. stocks)</text>
  <text x="510" y="375" fill="#94a3b8" font-size="9">15% VXUS (International)</text>
  <text x="510" y="392" fill="#94a3b8" font-size="9">35% BND (Bonds)</text>
  <text x="510" y="412" fill="#6366f1" font-size="9" font-weight="600">Expected: 6-8%/year</text>
</svg>
