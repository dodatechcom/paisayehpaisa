<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" width="760" height="440">
  <rect width="760" height="440" fill="#1a1d23" rx="8"/>
  <text x="380" y="26" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">How to Invest 10000 Without Losing Money</text>

  <rect x="40" y="50" width="215" height="195" fill="#1e293b" rx="6"/>
  <rect x="40" y="50" width="215" height="28" fill="#22c55e" rx="6"/>
  <rect x="40" y="70" width="215" height="8" fill="#22c55e"/>
  <text x="147" y="69" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">Diversify Across Asset Classes</text>
  <text x="55" y="98" fill="#94a3b8" font-size="10">50% Stocks (VTI, VOO)</text>
  <text x="55" y="114" fill="#94a3b8" font-size="10">20% Bonds (BND, AGG)</text>
  <text x="55" y="130" fill="#94a3b8" font-size="10">15% International (VXUS)</text>
  <text x="55" y="146" fill="#94a3b8" font-size="10">10% REITs (VNQ)</text>
  <text x="55" y="162" fill="#94a3b8" font-size="10">5% High-Yield Savings</text>
  <text x="55" y="185" fill="#22c55e" font-size="11" font-weight="600">Reduces risk without eliminating gains</text>
  <text x="55" y="201" fill="#94a3b8" font-size="10">Target return: 8-10% annually</text>
  <text x="55" y="217" fill="#94a3b8" font-size="10">Volatility: Reduced by 30-40%</text>
  <text x="55" y="233" fill="#94a3b8" font-size="10">Drawdown: Max 20-25% in bad years</text>

  <rect x="270" y="50" width="215" height="195" fill="#1e293b" rx="6"/>
  <rect x="270" y="50" width="215" height="28" fill="#6366f1" rx="6"/>
  <rect x="270" y="70" width="215" height="8" fill="#6366f1"/>
  <text x="377" y="69" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">Keep 6-Month Buffer</text>
  <text x="285" y="98" fill="#94a3b8" font-size="10">Never invest money you need soon</text>
  <text x="285" y="114" fill="#94a3b8" font-size="10">Keep emergency fund separate</text>
  <text x="285" y="130" fill="#94a3b8" font-size="10">3-6 months expenses in savings</text>
  <text x="285" y="146" fill="#94a3b8" font-size="10">Market can drop 30% in any year</text>
  <text x="285" y="162" fill="#94a3b8" font-size="10">You need time to recover losses</text>
  <text x="285" y="185" fill="#6366f1" font-size="11" font-weight="600">Rule: Don't invest emergency funds</text>
  <text x="285" y="201" fill="#94a3b8" font-size="10">Keep it in high-yield savings</text>
  <text x="285" y="217" fill="#94a3b8" font-size="10">Only invest what you can leave for 5+ years</text>
  <text x="285" y="233" fill="#94a3b8" font-size="10">Reduces panic selling risk</text>

  <rect x="500" y="50" width="220" height="195" fill="#1e293b" rx="6"/>
  <rect x="500" y="50" width="220" height="28" fill="#d97706" rx="6"/>
  <rect x="500" y="70" width="220" height="8" fill="#d97706"/>
  <text x="610" y="69" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">Use Dollar-Cost Averaging</text>
  <text x="515" y="98" fill="#94a3b8" font-size="10">Invest 1000/month for 10 months</text>
  <text x="515" y="114" fill="#94a3b8" font-size="10">Smooths out market volatility</text>
  <text x="515" y="130" fill="#94a3b8" font-size="10">Buys more shares when prices drop</text>
  <text x="515" y="146" fill="#94a3b8" font-size="10">Eliminates timing risk</text>
  <text x="515" y="162" fill="#94a3b8" font-size="10">Emotionally easier than lump sum</text>
  <text x="515" y="185" fill="#d97706" font-size="11" font-weight="600">Reduces risk by 20-30%</text>
  <text x="515" y="201" fill="#94a3b8" font-size="10">vs investing all at once</text>
  <text x="515" y="217" fill="#94a3b8" font-size="10">Study: DCA beats lump sum 60% of time</text>
  <text x="515" y="233" fill="#94a3b8" font-size="10">when starting at market peaks</text>

  <rect x="40" y="260" width="310" height="130" fill="#1e293b" rx="6"/>
  <rect x="40" y="260" width="310" height="28" fill="#ef4444" rx="6"/>
  <rect x="40" y="280" width="310" height="8" fill="#ef4444"/>
  <text x="195" y="279" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">Avoid These Mistakes</text>
  <text x="55" y="308" fill="#94a3b8" font-size="10">Putting all 10k in one stock</text>
  <text x="55" y="324" fill="#94a3b8" font-size="10">Chasing hot tips and meme stocks</text>
  <text x="55" y="340" fill="#94a3b8" font-size="10">Panicking during market drops</text>
  <text x="55" y="356" fill="#94a3b8" font-size="10">Checking portfolio every day</text>
  <text x="55" y="372" fill="#ef4444" font-size="11" font-weight="600">These destroy returns over time</text>

  <rect x="370" y="260" width="350" height="130" fill="#1e293b" rx="6"/>
  <rect x="370" y="260" width="350" height="28" fill="#059669" rx="6"/>
  <rect x="370" y="280" width="350" height="8" fill="#059669"/>
  <text x="545" y="279" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">What to Do Instead</text>
  <text x="385" y="308" fill="#94a3b8" font-size="10">Diversify across 5 asset classes</text>
  <text x="385" y="324" fill="#94a3b8" font-size="10">Use dollar-cost averaging</text>
  <text x="385" y="340" fill="#94a3b8" font-size="10">Rebalance once per year</text>
  <text x="385" y="356" fill="#94a3b8" font-size="10">Stay invested for 10+ years</text>
  <text x="385" y="372" fill="#059669" font-size="11" font-weight="600">These habits compound wealth over time</text>

  <text x="380" y="420" fill="#fbbf24" font-size="11" font-weight="600" text-anchor="middle">Key: Protect the downside and the upside will take care of itself</text>
</svg>
