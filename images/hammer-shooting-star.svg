  <rect x="410" y="348" width="30" height="22" fill="#22c55e" rx="1"/>
  <line x1="480" y1="350" x2="480" y2="388" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="465" y="358" width="30" height="20" fill="#22c55e" rx="1"/>
  <line x1="535" y1="355" x2="535" y2="392" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="520" y="365" width="30" height="18" fill="#22c55e" rx="1"/>

  <!-- SHOOTING STAR candle -->
  <line x1="600" y1="310" x2="600" y2="410" stroke="#ef4444" stroke-width="2.5"/>
  <rect x="582" y="382" width="36" height="25" fill="#ef4444" rx="1"/>
  <rect x="590" y="310" width="20" height="18" fill="#ef4444" rx="1"/>

  <!-- Confirmation bearish -->
  <line x1="655" y1="380" x2="655" y2="450" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="640" y="400" width="30" height="30" fill="#ef4444" rx="1"/>

  <!-- Labels -->
  <rect x="485" y="378" width="65" height="18" fill="#1a1d23" rx="9"/>
  <text x="517" y="391" fill="#22c55e" font-size="11" font-weight="600" text-anchor="middle">Uptrend</text>
  <rect x="585" y="415" width="60" height="18" fill="#1a1d23" rx="9"/>
  <text x="615" y="428" fill="#ef4444" font-size="11" font-weight="600" text-anchor="middle">Long upper wick</text>
  <rect x="590" y="370" width="30" height="18" fill="#ef4444" rx="4"/>
  <text x="605" y="383" fill="#1a1d23" font-size="10" font-weight="700" text-anchor="middle">SMALL BODY</text>

</svg>
