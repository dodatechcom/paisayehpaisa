  <rect x="390" y="305" width="330" height="200" fill="url(#g2)" rx="4"/>

  <text x="383" y="318" fill="#64748b" font-size="12" text-anchor="end">110</text>
  <text x="383" y="388" fill="#64748b" font-size="12" text-anchor="end">105</text>
  <text x="383" y="458" fill="#64748b" font-size="12" text-anchor="end">100</text>
  <text x="383" y="495" fill="#64748b" font-size="12" text-anchor="end">95</text>
  <line x1="390" y1="325" x2="720" y2="325" stroke="#2a2d35" stroke-width="0.5"/>
  <line x1="390" y1="395" x2="720" y2="395" stroke="#2a2d35" stroke-width="0.5"/>
  <line x1="390" y1="465" x2="720" y2="465" stroke="#2a2d35" stroke-width="0.5"/>
  <line x1="390" y1="495" x2="720" y2="495" stroke="#2a2d35" stroke-width="0.5"/>

