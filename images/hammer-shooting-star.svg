  <rect x="215" y="338" width="55" height="18" fill="#1a1d23" rx="9"/>
  <text x="242" y="350" fill="#22c55e" font-size="11" font-weight="600" text-anchor="middle">Long lower wick</text>
  <rect x="225" y="210" width="45" height="18" fill="#22c55e" rx="4"/>
  <text x="247" y="223" fill="#1a1d23" font-size="10" font-weight="700" text-anchor="middle">SMALL BODY</text>

  <!-- Right side: Hammer anatomy -->
  <rect x="400" y="68" width="320" height="130" fill="#1e293b" rx="6"/>
  <text x="560" y="90" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">Hammer Anatomy</text>
  <line x1="440" y1="110" x2="440" y2="175" stroke="#22c55e" stroke-width="2"/>
  <rect x="425" y="115" width="30" height="25" fill="#22c55e" rx="1"/>
  <line x1="440" y1="115" x2="500" y2="118" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="505" y="121" fill="#94a3b8" font-size="11">Upper wick (short or none)</text>
  <line x1="440" y1="140" x2="500" y2="140" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="505" y="143" fill="#94a3b8" font-size="11">Small body at top</text>
  <line x1="440" y1="175" x2="500" y2="170" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="505" y="173" fill="#94a3b8" font-size="11">Lower wick (2x+ body length)</text>

  <rect x="400" y="210" width="320" height="55" fill="#f59e0b" fill-opacity="0.08" rx="6"/>
  <text x="560" y="233" fill="#fbbf24" font-size="12" font-weight="600" text-anchor="middle">💡 Forms after a downtrend. Shows sellers pushed</text>
  <text x="560" y="253" fill="#fbbf24" font-size="12" text-anchor="middle">price down, but buyers fought back to near the open.</text>

  <!-- ═══════ RIGHT PANEL: SHOOTING STAR ═══════ -->
