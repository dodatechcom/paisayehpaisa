  <text x="33" y="78" fill="#64748b" font-size="12" text-anchor="end">105</text>
  <text x="33" y="168" fill="#64748b" font-size="12" text-anchor="end">100</text>
  <text x="33" y="258" fill="#64748b" font-size="12" text-anchor="end">95</text>
  <text x="33" y="335" fill="#64748b" font-size="12" text-anchor="end">90</text>
  <line x1="40" y1="85" x2="370" y2="85" stroke="#2a2d35" stroke-width="0.5"/>
  <line x1="40" y1="175" x2="370" y2="175" stroke="#2a2d35" stroke-width="0.5"/>
  <line x1="40" y1="265" x2="370" y2="265" stroke="#2a2d35" stroke-width="0.5"/>
  <line x1="40" y1="335" x2="370" y2="335" stroke="#2a2d35" stroke-width="0.5"/>

  <!-- Hammer downtrend candles -->
  <line x1="75" y1="100" x2="75" y2="150" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="60" y="108" width="30" height="28" fill="#ef4444" rx="1"/>
  <line x1="130" y1="135" x2="130" y2="185" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="115" y="145" width="30" height="26" fill="#ef4444" rx="1"/>
  <line x1="185" y1="170" x2="185" y2="220" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="170" y="180" width="30" height="24" fill="#ef4444" rx="1"/>

  <!-- HAMMER candle -->
  <line x1="245" y1="200" x2="245" y2="330" stroke="#22c55e" stroke-width="2.5"/>
