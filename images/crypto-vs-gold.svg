<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" width="760" height="480">
  <rect width="760" height="480" fill="#1a1d23" rx="8"/>
  <text x="380" y="26" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">Crypto vs Gold: Which Is the Better Store of Value?</text>

  <!-- Crypto side -->
  <rect x="40" y="45" width="330" height="420" fill="#1e293b" rx="6"/>
  <rect x="40" y="45" width="330" height="35" fill="#f59e0b" rx="6"/>
  <rect x="40" y="70" width="330" height="10" fill="#f59e0b"/>
  <text x="205" y="68" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">Bitcoin (BTC)</text>

  <text x="60" y="100" fill="#f59e0b" font-size="11" font-weight="600">Store of Value</text>
  <text x="60" y="118" fill="#94a3b8" font-size="10">• Finite supply: 21 million BTC</text>
  <text x="60" y="134" fill="#94a3b8" font-size="10">• Halving every 4 years</text>
  <text x="60" y="150" fill="#94a3b8" font-size="10">• Increasingly scarce over time</text>

  <text x="60" y="175" fill="#f59e0b" font-size="11" font-weight="600">Performance</text>
  <text x="60" y="193" fill="#94a3b8" font-size="10">• 10-year return: +15,000%</text>
  <text x="60" y="209" fill="#94a3b8" font-size="10">• Average annual: 100%+</text>
  <text x="60" y="225" fill="#94a3b8" font-size="10">• Best year: +1,300%</text>
  <text x="60" y="241" fill="#94a3b8" font-size="10">• Worst year: -75%</text>

  <text x="60" y="266" fill="#f59e0b" font-size="11" font-weight="600">Characteristics</text>
  <text x="60" y="284" fill="#94a3b8" font-size="10">• Decentralized (no government control)</text>
  <text x="60" y="300" fill="#94a3b8" font-size="10">• 24/7 global trading</text>
  <text x="60" y="316" fill="#94a3b8" font-size="10">• Portable (send anywhere)</text>
  <text x="60" y="332" fill="#94a3b8" font-size="10">• Divisible to 8 decimals</text>
  <text x="60" y="348" fill="#94a3b8" font-size="10">• Verifiable (blockchain proof)</text>

  <text x="60" y="373" fill="#f59e0b" font-size="11" font-weight="600">Risks</text>
  <text x="60" y="391" fill="#94a3b8" font-size="10">• Extreme volatility (-80% crashes)</text>
  <text x="60" y="407" fill="#94a3b8" font-size="10">• Regulatory uncertainty</text>
  <text x="60" y="423" fill="#94a3b8" font-size="10">• No intrinsic value</text>
  <text x="60" y="439" fill="#94a3b8" font-size="10">• Still early adoption phase</text>

  <!-- Gold side -->
  <rect x="390" y="45" width="330" height="420" fill="#1e293b" rx="6"/>
  <rect x="390" y="45" width="330" height="35" fill="#eab308" rx="6"/>
  <rect x="390" y="70" width="330" height="10" fill="#eab308"/>
  <text x="555" y="68" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">Gold (XAU)</text>

  <text x="410" y="100" fill="#eab308" font-size="11" font-weight="600">Store of Value</text>
  <text x="410" y="118" fill="#94a3b8" font-size="10">• 5,000 years of history</text>
  <text x="410" y="134" fill="#94a3b8" font-size="10">• Finite but supply grows 1.5%/year</text>
  <text x="410" y="150" fill="#94a3b8" font-size="10">• Central banks hold 35,000 tons</text>

  <text x="410" y="175" fill="#eab308" font-size="11" font-weight="600">Performance</text>
  <text x="410" y="193" fill="#94a3b8" font-size="10">• 10-year return: +80%</text>
  <text x="410" y="209" fill="#94a3b8" font-size="10">• Average annual: 7-8%</text>
  <text x="410" y="225" fill="#94a3b8" font-size="10">• Best year: +25%</text>
  <text x="410" y="241" fill="#94a3b8" font-size="10">• Worst year: -28%</text>

  <text x="410" y="266" fill="#eab308" font-size="11" font-weight="600">Characteristics</text>
  <text x="410" y="284" fill="#94a3b8" font-size="10">• Government-backed (central banks)</text>
  <text x="410" y="300" fill="#94a3b8" font-size="10">• Physical, tangible asset</text>
  <text x="410" y="316" fill="#94a3b8" font-size="10">• Industrial demand (electronics)</text>
  <text x="410" y="332" fill="#94a3b8" font-size="10">• Jewelry demand (50% of gold)</text>
  <text x="410" y="348" fill="#94a3b8" font-size="10">• Accepted everywhere</text>

  <text x="410" y="373" fill="#eab308" font-size="11" font-weight="600">Risks</text>
  <text x="410" y="391" fill="#94a3b8" font-size="10">• Low returns vs stocks</text>
  <text x="410" y="407" fill="#94a3b8" font-size="10">• Storage costs and insurance</text>
  <text x="410" y="423" fill="#94a3b8" font-size="10">• Not divisible (hard to use as currency)</text>
  <text x="410" y="439" fill="#94a3b8" font-size="10">• Price manipulation concerns</text>
</svg>
