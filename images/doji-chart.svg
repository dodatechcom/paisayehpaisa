<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 500" width="760" height="500">
  <rect width="760" height="500" fill="#1a1d23" rx="8"/>
  <text x="380" y="26" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">Doji Candlestick — Visual Guide</text>

  <!-- Chart area -->
  <rect x="55" y="40" width="380" height="280" fill="url(#p)" rx="4"/>
  <defs><pattern id="p" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0L0 0 0 40" fill="none" stroke="#2a2d35" stroke-width="0.5"/></pattern></defs>

  <text x="48" y="54" fill="#64748b" font-size="13" text-anchor="end">62,000</text>
  <text x="48" y="134" fill="#64748b" font-size="13" text-anchor="end">60,000</text>
  <text x="48" y="214" fill="#64748b" font-size="13" text-anchor="end">58,000</text>
  <text x="48" y="308" fill="#64748b" font-size="13" text-anchor="end">56,000</text>
  <line x1="55" y1="61" x2="435" y2="61" stroke="#2a2d35" stroke-width="0.5"/>
  <line x1="55" y1="141" x2="435" y2="141" stroke="#2a2d35" stroke-width="0.5"/>
  <line x1="55" y1="221" x2="435" y2="221" stroke="#2a2d35" stroke-width="0.5"/>
  <line x1="55" y1="301" x2="435" y2="301" stroke="#2a2d35" stroke-width="0.5"/>

  <!-- Candle 1 bearish -->
  <line x1="90" y1="90" x2="90" y2="140" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="74" y="98" width="32" height="28" fill="#ef4444" rx="1"/>
  <!-- Candle 2 bearish -->
  <line x1="140" y1="118" x2="140" y2="168" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="124" y="128" width="32" height="26" fill="#ef4444" rx="1"/>
  <!-- Candle 3 bearish -->
  <line x1="190" y1="145" x2="190" y2="198" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="174" y="156" width="32" height="26" fill="#ef4444" rx="1"/>
  <!-- Candle 4 bearish -->
  <line x1="240" y1="175" x2="240" y2="225" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="224" y="185" width="32" height="22" fill="#ef4444" rx="1"/>

  <!-- Candle 5 DOJI: small horizontal line (body almost 0) -->
  <line x1="290" y1="190" x2="290" y2="270" stroke="#f59e0b" stroke-width="2"/>
  <line x1="272" y1="220" x2="308" y2="220" stroke="#f59e0b" stroke-width="3"/>

  <!-- Candle 6 bullish reversal -->
  <line x1="340" y1="108" x2="340" y2="175" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="324" y="118" width="32" height="40" fill="#22c55e" rx="1"/>
  <!-- Candle 7 bullish -->
  <line x1="390" y1="80" x2="390" y2="145" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="374" y="88" width="32" height="38" fill="#22c55e" rx="1"/>

  <!-- Annotations -->
  <rect x="185" y="150" width="80" height="20" fill="#1a1d23" rx="10"/>
  <text x="225" y="164" fill="#ef4444" font-size="12" font-weight="600" text-anchor="middle">Downtrend</text>
  <rect x="280" y="278" width="30" height="20" fill="#1a1d23" rx="10"/>
  <text x="295" y="291" fill="#f59e0b" font-size="12" font-weight="600" text-anchor="middle">?</text>
  <rect x="330" y="180" width="70" height="20" fill="#1a1d23" rx="10"/>
  <text x="365" y="194" fill="#22c55e" font-size="12" font-weight="600" text-anchor="middle">Reversal</text>

  <rect x="290" y="25" width="100" height="20" fill="#f59e0b" rx="4"/>
  <text x="340" y="39" fill="#1a1d23" font-size="11" font-weight="700" text-anchor="middle">DOJI (Indecision)</text>

  <!-- Right panel: Doji types -->
  <text x="530" y="54" fill="#e2e8f0" font-size="14" font-weight="700" text-anchor="middle">Types of Doji</text>

  <!-- Standard -->
  <rect x="455" y="70" width="150" height="100" fill="#1e293b" rx="6"/>
  <text x="530" y="90" fill="#f59e0b" font-size="12" font-weight="700" text-anchor="middle">Standard Doji</text>
  <line x1="510" y1="105" x2="510" y2="155" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="495" y1="130" x2="525" y2="130" stroke="#94a3b8" stroke-width="3"/>
  <text x="530" y="162" fill="#94a3b8" font-size="10" text-anchor="middle">Open ≈ Close</text>
  <text x="530" y="175" fill="#94a3b8" font-size="10" text-anchor="middle">Small/no body, short wicks</text>

  <!-- Dragonfly -->
  <rect x="615" y="70" width="130" height="100" fill="#1e293b" rx="6"/>
  <text x="680" y="90" fill="#22c55e" font-size="12" font-weight="700" text-anchor="middle">Dragonfly</text>
  <line x1="680" y1="105" x2="680" y2="160" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="665" y1="105" x2="695" y2="105" stroke="#22c55e" stroke-width="3"/>
  <text x="680" y="162" fill="#94a3b8" font-size="10" text-anchor="middle">Long lower wick</text>
  <text x="680" y="175" fill="#94a3b8" font-size="10" text-anchor="middle">Bullish if after downtrend</text>

  <!-- Gravestone -->
  <rect x="455" y="180" width="150" height="100" fill="#1e293b" rx="6"/>
  <text x="530" y="200" fill="#ef4444" font-size="12" font-weight="700" text-anchor="middle">Gravestone</text>
  <line x1="510" y1="205" x2="510" y2="265" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="498" y1="265" x2="522" y2="265" stroke="#ef4444" stroke-width="3"/>
  <text x="530" y="272" fill="#94a3b8" font-size="10" text-anchor="middle">Long upper wick</text>
  <text x="530" y="285" fill="#94a3b8" font-size="10" text-anchor="middle">Bearish if after uptrend</text>

  <!-- Long-legged -->
  <rect x="615" y="180" width="130" height="100" fill="#1e293b" rx="6"/>
  <text x="680" y="200" fill="#94a3b8" font-size="12" font-weight="700" text-anchor="middle">Long-Legged</text>
  <line x1="680" y1="205" x2="680" y2="270" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="665" y1="238" x2="695" y2="238" stroke="#94a3b8" stroke-width="3"/>
  <text x="680" y="272" fill="#94a3b8" font-size="10" text-anchor="middle">Long upper &amp; lower wicks</text>
  <text x="680" y="285" fill="#94a3b8" font-size="10" text-anchor="middle">High volatility indecision</text>

  <!-- Psychology box -->
  <rect x="40" y="340" width="680" height="120" fill="#1e293b" rx="6"/>
  <text x="380" y="365" fill="#e2e8f0" font-size="14" font-weight="700" text-anchor="middle">The Psychology Behind a Doji</text>
  <text x="380" y="392" fill="#94a3b8" font-size="12" text-anchor="middle">During the trading period, buyers pushed the price up and sellers pushed it down — but neither side won.</text>
  <text x="380" y="414" fill="#94a3b8" font-size="12" text-anchor="middle">The open and close at nearly the same price means the market is at a tipping point.</text>
  <text x="380" y="440" fill="#fbbf24" font-size="12" text-anchor="middle">💡 A doji alone is NOT a signal. It gains meaning only after a strong trend and with confirmation.</text>

  <!-- Legend -->
  <rect x="40" y="475" width="12" height="12" fill="#ef4444" rx="2"/><text x="56" y="485" fill="#94a3b8" font-size="11">Bearish</text>
  <rect x="130" y="475" width="12" height="12" fill="#22c55e" rx="2"/><text x="146" y="485" fill="#94a3b8" font-size="11">Bullish</text>
  <rect x="220" y="475" width="12" height="12" fill="#f59e0b" rx="2"/><text x="236" y="485" fill="#94a3b8" font-size="11">Doji (indecision)</text>
</svg>
