<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" width="760" height="480">
  <rect width="760" height="480" fill="#1a1d23" rx="8"/>
  <text x="380" y="26" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">What to Do When the Market Crashes</text>

  <!-- Left side: crash phases -->
  <rect x="40" y="45" width="340" height="420" fill="#1e293b" rx="6"/>
  <text x="210" y="70" fill="#e2e8f0" font-size="14" font-weight="700" text-anchor="middle">Crash Timeline</text>

  <rect x="60" y="85" width="300" height="30" fill="#dc2626" rx="4" opacity="0.2"/>
  <rect x="60" y="85" width="75" height="30" fill="#dc2626" rx="4"/>
  <text x="97" y="105" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">Week 1-2</text>
  <text x="145" y="105" fill="#f87171" font-size="10">Panic selling, headlines everywhere</text>

  <rect x="60" y="125" width="300" height="30" fill="#f97316" rx="4" opacity="0.2"/>
  <rect x="60" y="125" width="120" height="30" fill="#f97316" rx="4"/>
  <text x="120" y="145" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">Month 1-3</text>
  <text x="190" y="145" fill="#fb923c" font-size="10">Fear peaks, "this time is different"</text>

  <rect x="60" y="165" width="300" height="30" fill="#d97706" rx="4" opacity="0.2"/>
  <rect x="60" y="165" width="165" height="30" fill="#d97706" rx="4"/>
  <text x="142" y="185" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">Month 3-6</text>
  <text x="235" y="185" fill="#fbbf24" font-size="10">Recovery starts, investors still scared</text>

  <rect x="60" y="205" width="300" height="30" fill="#6366f1" rx="4" opacity="0.2"/>
  <rect x="60" y="205" width="210" height="30" fill="#6366f1" rx="4"/>
  <text x="165" y="225" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">Month 6-12</text>
  <text x="280" y="225" fill="#818cf8" font-size="10">New highs, missed opportunity</text>

  <!-- Buy zones -->
  <text x="210" y="265" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">Where to Buy</text>

  <rect x="60" y="280" width="300" height="25" fill="#22c55e" rx="4" opacity="0.15"/>
  <text x="70" y="297" fill="#22c55e" font-size="10" font-weight="600">Aggressive</text>
  <text x="140" y="297" fill="#94a3b8" font-size="10">Buy at -10% from top</text>

  <rect x="60" y="310" width="300" height="25" fill="#22c55e" rx="4" opacity="0.25"/>
  <text x="70" y="327" fill="#22c55e" font-size="10" font-weight="600">Moderate</text>
  <text x="140" y="327" fill="#94a3b8" font-size="10">Buy at -20% from top</text>

  <rect x="60" y="340" width="300" height="25" fill="#22c55e" rx="4" opacity="0.4"/>
  <text x="70" y="357" fill="#fff" font-size="10" font-weight="700">Optimal</text>
  <text x="140" y="357" fill="#94a3b8" font-size="10">Buy at -30% from top</text>

  <rect x="60" y="370" width="300" height="25" fill="#22c55e" rx="4" opacity="0.6"/>
  <text x="70" y="387" fill="#fff" font-size="10" font-weight="700">Extreme</text>
  <text x="140" y="387" fill="#94a3b8" font-size="10">Buy at -40%+ (once a decade)</text>

  <!-- Historical crashes -->
  <text x="210" y="415" fill="#e2e8f0" font-size="11" font-weight="600" text-anchor="middle">Historical Crashes &amp; Recovery</text>
  <text x="70" y="435" fill="#94a3b8" font-size="10">2008: -56%, recovered in 4 years</text>
  <text x="70" y="452" fill="#94a3b8" font-size="10">2020: -34%, recovered in 5 months</text>

  <!-- Right side: strategy -->
  <rect x="400" y="45" width="320" height="420" fill="#1e293b" rx="6"/>
  <text x="560" y="70" fill="#e2e8f0" font-size="14" font-weight="700" text-anchor="middle">Your Crash Playbook</text>

  <rect x="420" y="85" width="280" height="70" fill="#22c55e" rx="4"/>
  <text x="430" y="105" fill="#fff" font-size="11" font-weight="700">DO:</text>
  <text x="430" y="120" fill="#e2e8f0" font-size="10">Stay invested and stay calm</text>
  <text x="430" y="135" fill="#e2e8f0" font-size="10">Buy more at lower prices</text>
  <text x="430" y="150" fill="#e2e8f0" font-size="10">Rebalance if needed</text>

  <rect x="420" y="165" width="280" height="70" fill="#dc2626" rx="4"/>
  <text x="430" y="185" fill="#fff" font-size="11" font-weight="700">DON'T:</text>
  <text x="430" y="200" fill="#fecaca" font-size="10">Don't panic sell at the bottom</text>
  <text x="430" y="215" fill="#fecaca" font-size="10">Don't try to time the market</text>
  <text x="430" y="230" fill="#fecaca" font-size="10">Don't check your portfolio daily</text>

  <!-- Dollar cost averaging -->
  <rect x="420" y="250" width="280" height="130" fill="#1a1d23" rx="4"/>
  <text x="560" y="275" fill="#22c55e" font-size="12" font-weight="700" text-anchor="middle">Dollar-Cost Averaging</text>
  <text x="435" y="298" fill="#94a3b8" font-size="10">Instead of investing $6,000 all at once:</text>
  <text x="435" y="318" fill="#60a5fa" font-size="10">Invest $500/month for 12 months</text>
  <text x="435" y="338" fill="#94a3b8" font-size="10">Benefits:</text>
  <text x="435" y="355" fill="#94a3b8" font-size="10">• Buy at various price points</text>
  <text x="435" y="370" fill="#94a3b8" font-size="10">• Remove emotion from decisions</text>
  <text x="435" y="385" fill="#94a3b8" font-size="10">• Capture recovery automatically</text>

  <!-- Key numbers -->
  <rect x="420" y="395" width="280" height="60" fill="#1a1d23" rx="4"/>
  <text x="560" y="415" fill="#e2e8f0" font-size="11" font-weight="700" text-anchor="middle">Historical Recovery Times</text>
  <text x="435" y="435" fill="#94a3b8" font-size="10">-10% drop: ~1 month | -20%: ~3 months</text>
  <text x="435" y="448" fill="#94a3b8" font-size="10">-30% drop: ~6 months | -50%: ~4 years</text>
</svg>
