<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 500" width="760" height="500">
  <rect width="760" height="500" fill="#1a1d23" rx="8"/>
  <text x="380" y="28" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle" font-family="sans-serif">How Health Insurance Works</text>

  <!-- ===== US ===== -->
  <rect x="28" y="48" width="226" height="222" fill="#1e293b" rx="8"/>
  <rect x="28" y="48" width="226" height="36" fill="#6366f1" rx="8"/>
  <rect x="28" y="76" width="226" height="8" fill="#6366f1"/>
  <text x="141" y="71" fill="#fff" font-size="14" font-weight="700" text-anchor="middle" font-family="sans-serif">United States</text>

  <text x="44" y="106" fill="#94a3b8" font-size="10" font-family="sans-serif">System</text>
  <text x="44" y="122" fill="#e2e8f0" font-size="12" font-weight="600" font-family="sans-serif">Employer plans + ACA Marketplace</text>

  <text x="44" y="150" fill="#94a3b8" font-size="10" font-family="sans-serif">How it's funded</text>
  <text x="44" y="166" fill="#e2e8f0" font-size="12" font-weight="600" font-family="sans-serif">Premiums + employer + taxes</text>

  <text x="44" y="194" fill="#94a3b8" font-size="10" font-family="sans-serif">Who covers you</text>
  <text x="44" y="210" fill="#e2e8f0" font-size="12" font-weight="600" font-family="sans-serif">Aetna, BCBS, Cigna, UHC</text>

  <text x="44" y="238" fill="#94a3b8" font-size="10" font-family="sans-serif">Example costs</text>
  <text x="44" y="258" fill="#6366f1" font-size="13" font-weight="700" font-family="sans-serif">~$500/mo·$2,500 deductible</text>

  <!-- ===== UK ===== -->
  <rect x="267" y="48" width="226" height="222" fill="#1e293b" rx="8"/>
  <rect x="267" y="48" width="226" height="36" fill="#2563eb" rx="8"/>
  <rect x="267" y="76" width="226" height="8" fill="#2563eb"/>
  <text x="380" y="71" fill="#fff" font-size="14" font-weight="700" text-anchor="middle" font-family="sans-serif">United Kingdom</text>

  <text x="283" y="106" fill="#94a3b8" font-size="10" font-family="sans-serif">System</text>
  <text x="283" y="122" fill="#e2e8f0" font-size="12" font-weight="600" font-family="sans-serif">NHS — free at point of use</text>

  <text x="283" y="150" fill="#94a3b8" font-size="10" font-family="sans-serif">How it's funded</text>
  <text x="283" y="166" fill="#e2e8f0" font-size="12" font-weight="600" font-family="sans-serif">General taxation + NI</text>

  <text x="283" y="194" fill="#94a3b8" font-size="10" font-family="sans-serif">Who covers you</text>
  <text x="283" y="210" fill="#e2e8f0" font-size="12" font-weight="600" font-family="sans-serif">NHS, AXA UK, Bupa, Vitality</text>

  <text x="283" y="238" fill="#94a3b8" font-size="10" font-family="sans-serif">Example costs</text>
  <text x="283" y="258" fill="#2563eb" font-size="13" font-weight="700" font-family="sans-serif">£0 NHS·£50–100/mo private</text>

  <!-- ===== CANADA ===== -->
  <rect x="506" y="48" width="226" height="222" fill="#1e293b" rx="8"/>
  <rect x="506" y="48" width="226" height="36" fill="#dc2626" rx="8"/>
  <rect x="506" y="76" width="226" height="8" fill="#dc2626"/>
  <text x="619" y="71" fill="#fff" font-size="14" font-weight="700" text-anchor="middle" font-family="sans-serif">Canada</text>

  <text x="522" y="106" fill="#94a3b8" font-size="10" font-family="sans-serif">System</text>
  <text x="522" y="122" fill="#e2e8f0" font-size="12" font-weight="600" font-family="sans-serif">Provincial (OHIP, MSP, RAMQ)</text>

  <text x="522" y="150" fill="#94a3b8" font-size="10" font-family="sans-serif">How it's funded</text>
  <text x="522" y="166" fill="#e2e8f0" font-size="12" font-weight="600" font-family="sans-serif">Taxes + provincial premiums</text>

  <text x="522" y="194" fill="#94a3b8" font-size="10" font-family="sans-serif">Who covers you</text>
  <text x="522" y="210" fill="#e2e8f0" font-size="11" font-weight="600" font-family="sans-serif">Provincial core + Manulife, Sun Life</text>

  <text x="522" y="238" fill="#94a3b8" font-size="10" font-family="sans-serif">Example costs</text>
  <text x="522" y="258" fill="#dc2626" font-size="13" font-weight="700" font-family="sans-serif">$0 core·$50–150/mo private</text>

  <!-- ===== KEY TERMS ===== -->
  <rect x="28" y="290" width="704" height="195" fill="#1e293b" rx="6"/>
  <text x="380" y="316" fill="#e2e8f0" font-size="14" font-weight="700" text-anchor="middle" font-family="sans-serif">Key Insurance Terms</text>

  <!-- Deductible -->
  <rect x="45" y="335" width="160" height="108" fill="#1a1d23" rx="6"/>
  <rect x="45" y="335" width="160" height="26" fill="#6366f1" rx="6"/>
  <rect x="45" y="353" width="160" height="8" fill="#6366f1"/>
  <text x="125" y="353" fill="#fff" font-size="11" font-weight="700" text-anchor="middle" font-family="sans-serif">Deductible</text>
  <text x="57" y="379" fill="#e2e8f0" font-size="11" font-family="sans-serif">Amount you pay before</text>
  <text x="57" y="396" fill="#e2e8f0" font-size="11" font-family="sans-serif">insurance covers costs</text>
  <text x="57" y="420" fill="#94a3b8" font-size="10" font-family="sans-serif">$1,000–$5,000+/yr (US)</text>

  <!-- Copay -->
  <rect x="215" y="335" width="160" height="108" fill="#1a1d23" rx="6"/>
  <rect x="215" y="335" width="160" height="26" fill="#6366f1" rx="6"/>
  <rect x="215" y="353" width="160" height="8" fill="#6366f1"/>
  <text x="295" y="353" fill="#fff" font-size="11" font-weight="700" text-anchor="middle" font-family="sans-serif">Copay</text>
  <text x="227" y="379" fill="#e2e8f0" font-size="11" font-family="sans-serif">Fixed fee for doctor</text>
  <text x="227" y="396" fill="#e2e8f0" font-size="11" font-family="sans-serif">visits or prescriptions</text>
  <text x="227" y="420" fill="#94a3b8" font-size="10" font-family="sans-serif">E.g., $30 GP visit</text>

  <!-- Coinsurance -->
  <rect x="385" y="335" width="160" height="108" fill="#1a1d23" rx="6"/>
  <rect x="385" y="335" width="160" height="26" fill="#6366f1" rx="6"/>
  <rect x="385" y="353" width="160" height="8" fill="#6366f1"/>
  <text x="465" y="353" fill="#fff" font-size="11" font-weight="700" text-anchor="middle" font-family="sans-serif">Coinsurance</text>
  <text x="397" y="379" fill="#e2e8f0" font-size="11" font-family="sans-serif">Your share of costs</text>
  <text x="397" y="396" fill="#e2e8f0" font-size="11" font-family="sans-serif">once deductible is met</text>
  <text x="397" y="420" fill="#94a3b8" font-size="10" font-family="sans-serif">e.g., You pay 20%</text>

  <!-- Out-of-Pocket Max -->
  <rect x="555" y="335" width="160" height="108" fill="#1a1d23" rx="6"/>
  <rect x="555" y="335" width="160" height="26" fill="#6366f1" rx="6"/>
  <rect x="555" y="353" width="160" height="8" fill="#6366f1"/>
  <text x="635" y="353" fill="#fff" font-size="11" font-weight="700" text-anchor="middle" font-family="sans-serif">OOP Max</text>
  <text x="567" y="379" fill="#e2e8f0" font-size="11" font-family="sans-serif">Maximum you pay</text>
  <text x="567" y="396" fill="#e2e8f0" font-size="11" font-family="sans-serif">before insurer pays 100%</text>
  <text x="567" y="420" fill="#94a3b8" font-size="10" font-family="sans-serif">$3,000–$9,000+/yr</text>

  <text x="380" y="473" fill="#64748b" font-size="10" text-anchor="middle" font-family="sans-serif">Health insurance systems vary by country. Key terms are most common in US-style plans.</text>
</svg>
