<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" width="760" height="480">
  <rect width="760" height="480" fill="#1a1d23" rx="8"/>
  <text x="380" y="26" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">Investing in Your 30s: Peak Earning Years</text>

  <!-- 30s priorities -->
  <rect x="40" y="45" width="340" height="210" fill="#1e293b" rx="6"/>
  <text x="210" y="68" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">Your 30s Financial Priorities</text>

  <rect x="60" y="85" width="300" height="30" fill="#22c55e" rx="4"/>
  <text x="70" y="104" fill="#fff" font-size="10" font-weight="600">1. Max 401(k) match (free money)</text>

  <rect x="60" y="120" width="300" height="30" fill="#22c55e" rx="4" opacity="0.8"/>
  <text x="70" y="139" fill="#fff" font-size="10" font-weight="600">2. Build 6-month emergency fund</text>

  <rect x="60" y="155" width="300" height="30" fill="#22c55e" rx="4" opacity="0.6"/>
  <text x="70" y="174" fill="#fff" font-size="10" font-weight="600">3. Max out Roth IRA ($7,000/yr)</text>

  <rect x="60" y="190" width="300" height="30" fill="#22c55e" rx="4" opacity="0.4"/>
  <text x="70" y="209" fill="#fff" font-size="10" font-weight="600">4. Invest 15-20% of income</text>

  <rect x="60" y="225" width="300" height="20" fill="#22c55e" rx="4" opacity="0.3"/>
  <text x="70" y="240" fill="#fff" font-size="9" font-weight="600">5. Pay off high-interest debt</text>

  <!-- 30s portfolio -->
  <rect x="400" y="45" width="320" height="210" fill="#1e293b" rx="6"/>
  <text x="560" y="68" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">Your 30s Portfolio</text>

  <rect x="420" y="85" width="280" height="165" fill="#1a1d23" rx="4"/>
  <text x="560" y="108" fill="#22c55e" font-size="11" font-weight="700" text-anchor="middle">Growth Portfolio (Age 30-34)</text>
  <text x="435" y="132" fill="#94a3b8" font-size="10">65% VTI (U.S. stocks)</text>
  <text x="435" y="150" fill="#94a3b8" font-size="10">15% VXUS (International)</text>
  <text x="435" y="168" fill="#94a3b8" font-size="10">10% VUG (Growth stocks)</text>
  <text x="435" y="186" fill="#94a3b8" font-size="10">10% BND (Bonds)</text>
  <text x="435" y="210" fill="#22c55e" font-size="9" font-weight="600">Expected return: 9-11%/year</text>
  <text x="435" y="228" fill="#94a3b8" font-size="9">Risk: High (you have 30+ years)</text>

  <!-- Math -->
  <rect x="40" y="270" width="680" height="195" fill="#1e293b" rx="6"/>
  <text x="380" y="295" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">The Math: Start at 30 vs 25</text>

  <rect x="60" y="315" width="310" height="135" fill="#1a1d23" rx="4"/>
  <text x="215" y="338" fill="#22c55e" font-size="10" font-weight="600" text-anchor="middle">Started at 25: $500/month</text>
  <text x="70" y="360" fill="#94a3b8" font-size="9">Invested: $240,000 (40 years)</text>
  <text x="70" y="378" fill="#94a3b8" font-size="9">Value at 65: $2,610,000</text>
  <text x="70" y="396" fill="#94a3b8" font-size="9">Gain: $2,370,000</text>
  <text x="70" y="418" fill="#22c55e" font-size="9" font-weight="600">Total return: 1,088%</text>

  <rect x="390" y="315" width="310" height="135" fill="#1a1d23" rx="4"/>
  <text x="545" y="338" fill="#f59e0b" font-size="10" font-weight="600" text-anchor="middle">Started at 30: $500/month</text>
  <text x="400" y="360" fill="#94a3b8" font-size="9">Invested: $210,000 (35 years)</text>
  <text x="400" y="378" fill="#94a3b8" font-size="9">Value at 65: $1,610,000</text>
  <text x="400" y="396" fill="#94a3b8" font-size="9">Gain: $1,400,000</text>
  <text x="400" y="418" fill="#f59e0b" font-size="9" font-weight="600">Total return: 767%</text>
</svg>
