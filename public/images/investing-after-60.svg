<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" width="760" height="480">
  <rect width="760" height="480" fill="#1a1d23" rx="8"/>
  <text x="380" y="26" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">Investing After 60: Retirement Strategy</text>

  <!-- Retirement income -->
  <rect x="40" y="45" width="340" height="210" fill="#1e293b" rx="6"/>
  <text x="210" y="68" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">Retirement Income Sources</text>

  <rect x="60" y="85" width="300" height="30" fill="#22c55e" rx="4"/>
  <text x="70" y="104" fill="#fff" font-size="10" font-weight="600">Social Security (avg $1,900/mo)</text>

  <rect x="60" y="120" width="300" height="30" fill="#6366f1" rx="4"/>
  <text x="70" y="139" fill="#fff" font-size="10" font-weight="600">Portfolio withdrawals (4% rule)</text>

  <rect x="60" y="155" width="300" height="30" fill="#f59e0b" rx="4"/>
  <text x="70" y="174" fill="#fff" font-size="10" font-weight="600">Pension (if available)</text>

  <rect x="60" y="190" width="300" height="55" fill="#1a1d23" rx="4"/>
  <text x="70" y="210" fill="#22c55e" font-size="10" font-weight="600">Target: $5,000-8,000/month</text>
  <text x="70" y="228" fill="#94a3b8" font-size="9">Social Security covers 30-40% of needs</text>

  <!-- 60s portfolio -->
  <rect x="400" y="45" width="320" height="210" fill="#1e293b" rx="6"/>
  <text x="560" y="68" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">Your 60s Portfolio</text>

  <rect x="420" y="85" width="280" height="165" fill="#1a1d23" rx="4"/>
  <text x="560" y="108" fill="#ef4444" font-size="11" font-weight="700" text-anchor="middle">Income &amp; Preservation</text>
  <text x="435" y="132" fill="#94a3b8" font-size="10">40% VTI (U.S. stocks)</text>
  <text x="435" y="150" fill="#94a3b8" font-size="10">10% VXUS (International)</text>
  <text x="435" y="168" fill="#94a3b8" font-size="10">30% BND (Bonds)</text>
  <text x="435" y="186" fill="#94a3b8" font-size="10">10% SCHP (TIPS)</text>
  <text x="435" y="204" fill="#94a3b8" font-size="10">10% REITs (Income)</text>
  <text x="435" y="225" fill="#ef4444" font-size="9" font-weight="600">Expected return: 5-7%/year</text>

  <!-- Withdrawal strategy -->
  <rect x="40" y="270" width="680" height="195" fill="#1e293b" rx="6"/>
  <text x="380" y="295" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">The 4% Withdrawal Rule</text>

  <rect x="60" y="315" width="310" height="135" fill="#1a1d23" rx="4"/>
  <text x="215" y="338" fill="#22c55e" font-size="10" font-weight="600" text-anchor="middle">Example: $1M Portfolio</text>
  <text x="70" y="360" fill="#94a3b8" font-size="9">Year 1 withdrawal: $40,000</text>
  <text x="70" y="377" fill="#94a3b8" font-size="9">Adjust for inflation each year</text>
  <text x="70" y="394" fill="#94a3b8" font-size="9">Portfolio lasts 30+ years</text>
  <text x="70" y="418" fill="#22c55e" font-size="9" font-weight="600">$3,333/month from portfolio</text>

  <rect x="390" y="315" width="310" height="135" fill="#1a1d23" rx="4"/>
  <text x="545" y="338" fill="#ef4444" font-size="10" font-weight="600" text-anchor="middle">Example: $500K Portfolio</text>
  <text x="400" y="360" fill="#94a3b8" font-size="9">Year 1 withdrawal: $20,000</text>
  <text x="400" y="377" fill="#94a3b8" font-size="9">Adjust for inflation each year</text>
  <text x="400" y="394" fill="#94a3b8" font-size="9">Portfolio lasts 30+ years</text>
  <text x="400" y="418" fill="#ef4444" font-size="9" font-weight="600">$1,667/month from portfolio</text>
</svg>
