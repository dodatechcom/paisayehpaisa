<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" width="760" height="480">
  <rect width="760" height="480" fill="#1a1d23" rx="8"/>
  <text x="380" y="26" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">How to Read Crypto Charts</text>

  <!-- Chart basics -->
  <rect x="40" y="45" width="340" height="210" fill="#1e293b" rx="6"/>
  <text x="210" y="68" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">Chart Basics</text>

  <text x="60" y="95" fill="#22c55e" font-size="10" font-weight="600">Price (Y-axis)</text>
  <text x="60" y="112" fill="#94a3b8" font-size="9">Shows the price of the crypto</text>
  <text x="60" y="127" fill="#94a3b8" font-size="9">Higher = more expensive</text>

  <text x="60" y="150" fill="#22c55e" font-size="10" font-weight="600">Time (X-axis)</text>
  <text x="60" y="167" fill="#94a3b8" font-size="9">Shows price over time</text>
  <text x="60" y="182" fill="#94a3b8" font-size="9">1m, 5m, 1h, 4h, 1D, 1W</text>

  <text x="60" y="205" fill="#22c55e" font-size="10" font-weight="600">Candlesticks</text>
  <text x="60" y="222" fill="#94a3b8" font-size="9">Green = price went up</text>
  <text x="60" y="237" fill="#94a3b8" font-size="9">Red = price went down</text>

  <!-- Candlestick anatomy -->
  <rect x="400" y="45" width="320" height="210" fill="#1e293b" rx="6"/>
  <text x="560" y="68" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">Candlestick Anatomy</text>

  <!-- Green candle -->
  <line x1="470" y1="95" x2="470" y2="190" stroke="#22c55e" stroke-width="2"/>
  <rect x="455" y="110" width="30" height="50" fill="#22c55e" rx="2"/>
  <text x="500" y="100" fill="#94a3b8" font-size="8">High: $45,000</text>
  <text x="500" y="135" fill="#22c55e" font-size="8" font-weight="600">Close: $44,800</text>
  <text x="500" y="155" fill="#ef4444" font-size="8">Open: $44,200</text>
  <text x="500" y="185" fill="#94a3b8" font-size="8">Low: $44,000</text>

  <text x="560" y="115" fill="#e2e8f0" font-size="10" font-weight="600">Green Candle</text>
  <text x="560" y="132" fill="#94a3b8" font-size="9">Price went UP</text>
  <text x="560" y="147" fill="#94a3b8" font-size="9">Close is higher than Open</text>
  <text x="560" y="162" fill="#94a3b8" font-size="9">Wick shows high/low</text>

  <!-- Red candle -->
  <line x1="640" y1="95" x2="640" y2="190" stroke="#ef4444" stroke-width="2"/>
  <rect x="625" y="115" width="30" height="50" fill="#ef4444" rx="2"/>
  <text x="670" y="100" fill="#94a3b8" font-size="8">High: $45,200</text>
  <text x="670" y="135" fill="#ef4444" font-size="8" font-weight="600">Open: $45,000</text>
  <text x="670" y="155" fill="#22c55e" font-size="8">Close: $44,500</text>
  <text x="670" y="185" fill="#94a3b8" font-size="8">Low: $44,300</text>

  <text x="560" y="205" fill="#e2e8f0" font-size="10" font-weight="600">Red Candle</text>
  <text x="560" y="222" fill="#94a3b8" font-size="9">Price went DOWN</text>
  <text x="560" y="237" fill="#94a3b8" font-size="9">Close is lower than Open</text>

  <!-- Common patterns -->
  <rect x="40" y="270" width="680" height="195" fill="#1e293b" rx="6"/>
  <text x="380" y="295" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">Common Chart Patterns</text>

  <rect x="60" y="315" width="150" height="135" fill="#1a1d23" rx="4"/>
  <text x="135" y="338" fill="#22c55e" font-size="10" font-weight="700" text-anchor="middle">Uptrend</text>
  <text x="70" y="358" fill="#94a3b8" font-size="9">Higher highs</text>
  <text x="70" y="375" fill="#94a3b8" font-size="9">Higher lows</text>
  <text x="70" y="392" fill="#94a3b8" font-size="9">Bullish trend</text>
  <text x="70" y="412" fill="#22c55e" font-size="9" font-weight="600">Look to buy dips</text>

  <rect x="225" y="315" width="150" height="135" fill="#1a1d23" rx="4"/>
  <text x="300" y="338" fill="#ef4444" font-size="10" font-weight="700" text-anchor="middle">Downtrend</text>
  <text x="235" y="358" fill="#94a3b8" font-size="9">Lower highs</text>
  <text x="235" y="375" fill="#94a3b8" font-size="9">Lower lows</text>
  <text x="235" y="392" fill="#94a3b8" font-size="9">Bearish trend</text>
  <text x="235" y="412" fill="#ef4444" font-size="9" font-weight="600">Avoid or short</text>

  <rect x="390" y="315" width="150" height="135" fill="#1a1d23" rx="4"/>
  <text x="465" y="338" fill="#f59e0b" font-size="10" font-weight="700" text-anchor="middle">Sideways</text>
  <text x="400" y="358" fill="#94a3b8" font-size="9">Range-bound</text>
  <text x="400" y="375" fill="#94a3b8" font-size="9">Support/resistance</text>
  <text x="400" y="392" fill="#94a3b8" font-size="9">Consolidation</text>
  <text x="400" y="412" fill="#f59e0b" font-size="9" font-weight="600">Wait for breakout</text>

  <rect x="555" y="315" width="145" height="135" fill="#1a1d23" rx="4"/>
  <text x="627" y="338" fill="#6366f1" font-size="10" font-weight="700" text-anchor="middle">Breakout</text>
  <text x="565" y="358" fill="#94a3b8" font-size="9">Price breaks</text>
  <text x="565" y="375" fill="#94a3b8" font-size="9">support/resistance</text>
  <text x="565" y="392" fill="#94a3b8" font-size="9">Volume spike</text>
  <text x="565" y="412" fill="#6366f1" font-size="9" font-weight="600">Potential trend change</text>
</svg>
