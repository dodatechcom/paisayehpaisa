<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" width="760" height="480">
  <rect width="760" height="480" fill="#1a1d23" rx="8"/>
  <text x="380" y="26" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">ETFs vs Mutual Funds: Complete Comparison</text>

  <!-- ETF side -->
  <rect x="40" y="45" width="330" height="420" fill="#1e293b" rx="6"/>
  <rect x="40" y="45" width="330" height="35" fill="#22c55e" rx="6"/>
  <rect x="40" y="70" width="330" height="10" fill="#22c55e"/>
  <text x="205" y="68" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">ETFs (Exchange-Traded Funds)</text>

  <text x="60" y="100" fill="#22c55e" font-size="11" font-weight="600">How They Work</text>
  <text x="60" y="118" fill="#94a3b8" font-size="10">• Trade like stocks throughout the day</text>
  <text x="60" y="134" fill="#94a3b8" font-size="10">• Price changes in real-time</text>
  <text x="60" y="150" fill="#94a3b8" font-size="10">• Buy/sell anytime market is open</text>

  <text x="60" y="175" fill="#22c55e" font-size="11" font-weight="600">Costs</text>
  <text x="60" y="193" fill="#94a3b8" font-size="10">• Expense ratio: 0.03-0.50%</text>
  <text x="60" y="209" fill="#94a3b8" font-size="10">• No minimum investment</text>
  <text x="60" y="225" fill="#94a3b8" font-size="10">• Commission: $0 at most brokers</text>
  <text x="60" y="241" fill="#94a3b8" font-size="10">• No loads (sales charges)</text>

  <text x="60" y="266" fill="#22c55e" font-size="11" font-weight="600">Tax Efficiency</text>
  <text x="60" y="284" fill="#94a3b8" font-size="10">• Very tax efficient</text>
  <text x="60" y="300" fill="#94a3b8" font-size="10">• In-kind creation/redemption</text>
  <text x="60" y="316" fill="#94a3b8" font-size="10">• Fewer capital gains distributions</text>

  <text x="60" y="341" fill="#22c55e" font-size="11" font-weight="600">Flexibility</text>
  <text x="60" y="359" fill="#94a3b8" font-size="10">• 2,000+ ETFs available</text>
  <text x="60" y="375" fill="#94a3b8" font-size="10">• Sector, theme, leveraged ETFs</text>
  <text x="60" y="391" fill="#94a3b8" font-size="10">• Options trading available</text>
  <text x="60" y="407" fill="#94a3b8" font-size="10">• Short selling possible</text>

  <text x="60" y="432" fill="#22c55e" font-size="11" font-weight="600">Best For</text>
  <text x="60" y="450" fill="#94a3b8" font-size="10">• Hands-off investors</text>

  <!-- Mutual Fund side -->
  <rect x="390" y="45" width="330" height="420" fill="#1e293b" rx="6"/>
  <rect x="390" y="45" width="330" height="35" fill="#6366f1" rx="6"/>
  <rect x="390" y="70" width="330" height="10" fill="#6366f1"/>
  <text x="555" y="68" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">Mutual Funds</text>

  <text x="410" y="100" fill="#6366f1" font-size="11" font-weight="600">How They Work</text>
  <text x="410" y="118" fill="#94a3b8" font-size="10">• Priced once per day (after market close)</text>
  <text x="410" y="134" fill="#94a3b8" font-size="10">• Buy/sell at end-of-day NAV price</text>
  <text x="410" y="150" fill="#94a3b8" font-size="10">• No intraday trading</text>

  <text x="410" y="175" fill="#6366f1" font-size="11" font-weight="600">Costs</text>
  <text x="410" y="193" fill="#94a3b8" font-size="10">• Expense ratio: 0.50-2.00%</text>
  <text x="410" y="209" fill="#94a3b8" font-size="10">• Minimum: $500-$3,000</text>
  <text x="410" y="225" fill="#94a3b8" font-size="10">• May have sales loads (1-5%)</text>
  <text x="410" y="241" fill="#94a3b8" font-size="10">• Transaction fees possible</text>

  <text x="410" y="266" fill="#6366f1" font-size="11" font-weight="600">Tax Efficiency</text>
  <text x="410" y="284" fill="#94a3b8" font-size="10">• Less tax efficient</text>
  <text x="410" y="300" fill="#94a3b8" font-size="10">• Must sell shares to redeem</text>
  <text x="410" y="316" fill="#94a3b8" font-size="10">• More capital gains distributions</text>

  <text x="410" y="341" fill="#6366f1" font-size="11" font-weight="600">Flexibility</text>
  <text x="410" y="359" fill="#94a3b8" font-size="10">• 10,000+ mutual funds available</text>
  <text x="410" y="375" fill="#94a3b8" font-size="10">• Active management options</text>
  <text x="410" y="391" fill="#94a3b8" font-size="10">• Automatic investment plans</text>
  <text x="410" y="407" fill="#94a3b8" font-size="10">• No short selling</text>

  <text x="410" y="432" fill="#6366f1" font-size="11" font-weight="600">Best For</text>
  <text x="410" y="450" fill="#94a3b8" font-size="10">• Hands-on investors</text>
</svg>
