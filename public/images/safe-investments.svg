  <!-- Axis -->
  <line x1="80" y1="260" x2="460" y2="260" stroke="#334155" stroke-width="1"/>
  <line x1="80" y1="85" x2="80" y2="260" stroke="#334155" stroke-width="1"/>
  <text x="270" y="280" fill="#94a3b8" font-size="10" text-anchor="middle">Risk Level →</text>
  <text x="65" y="175" fill="#94a3b8" font-size="10" text-anchor="middle" transform="rotate(-90,65,175)">Return →</text>

  <!-- Safe zone -->
  <rect x="80" y="85" width="120" height="175" fill="#22c55e" opacity="0.08"/>
