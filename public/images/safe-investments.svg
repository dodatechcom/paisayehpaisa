  <text x="610" y="68" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">Top Safe Picks</text>

  <text x="515" y="95" fill="#22c55e" font-size="10" font-weight="600">High-Yield Savings</text>
  <text x="515" y="110" fill="#94a3b8" font-size="9">Marcus, Ally, Discover</text>
  <text x="515" y="123" fill="#94a3b8" font-size="9">Yield: 4.5% | FDIC insured</text>

  <text x="515" y="148" fill="#22c55e" font-size="10" font-weight="600">Treasury Bills (T-Bills)</text>
  <text x="515" y="163" fill="#94a3b8" font-size="9">4-week to 52-week terms</text>
