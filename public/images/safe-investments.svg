  <text x="390" y="100" fill="#ef4444" font-size="10" font-weight="600" text-anchor="middle">HIGHER RISK</text>

  <!-- Investment points -->
  <circle cx="100" cy="235" r="6" fill="#22c55e"/>
  <text x="100" y="252" fill="#94a3b8" font-size="9" text-anchor="middle">Savings 4.5%</text>

  <circle cx="130" cy="220" r="6" fill="#22c55e"/>
  <text x="130" y="237" fill="#94a3b8" font-size="9" text-anchor="middle">T-Bills 4.8%</text>

  <circle cx="160" cy="200" r="6" fill="#22c55e"/>
  <text x="160" y="217" fill="#94a3b8" font-size="9" text-anchor="middle">CDs 4.5%</text>

  <circle cx="210" cy="185" r="6" fill="#f59e0b"/>
  <text x="210" y="202" fill="#94a3b8" font-size="9" text-anchor="middle">Bonds 5%</text>

  <circle cx="260" cy="165" r="6" fill="#f59e0b"/>
  <text x="260" y="182" fill="#94a3b8" font-size="9" text-anchor="middle">Div ETFs 4%</text>

  <circle cx="320" cy="140" r="6" fill="#f59e0b"/>
  <text x="320" y="157" fill="#94a3b8" font-size="9" text-anchor="middle">REITs 4.5%</text>

  <circle cx="380" cy="120" r="6" fill="#ef4444"/>
  <text x="380" y="137" fill="#94a3b8" font-size="9" text-anchor="middle">Stocks 10%</text>

  <circle cx="430" cy="105" r="6" fill="#ef4444"/>
  <text x="430" y="122" fill="#94a3b8" font-size="9" text-anchor="middle">Crypto 20%+</text>

  <!-- Top investments table -->
