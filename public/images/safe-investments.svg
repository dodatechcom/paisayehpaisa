  <text x="380" y="335" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">Safe Investments Compared</text>

  <text x="60" y="360" fill="#94a3b8" font-size="10" font-weight="600">Investment</text>
  <text x="210" y="360" fill="#94a3b8" font-size="10" font-weight="600">Yield</text>
  <text x="290" y="360" fill="#94a3b8" font-size="10" font-weight="600">Risk</text>
  <text x="370" y="360" fill="#94a3b8" font-size="10" font-weight="600">Liquidity</text>
  <text x="480" y="360" fill="#94a3b8" font-size="10" font-weight="600">Min. Investment</text>

  <line x1="60" y1="368" x2="620" y2="368" stroke="#334155" stroke-width="1"/>

  <text x="60" y="385" fill="#e2e8f0" font-size="10">High-Yield Savings</text>
  <text x="210" y="385" fill="#22c55e" font-size="10">4.5%</text>
  <text x="290" y="385" fill="#22c55e" font-size="10">Zero</text>
  <text x="370" y="385" fill="#22c55e" font-size="10">Instant</text>
  <text x="480" y="385" fill="#94a3b8" font-size="10">$0</text>

  <text x="60" y="405" fill="#e2e8f0" font-size="10">T-Bills</text>
  <text x="210" y="405" fill="#22c55e" font-size="10">4.8%</text>
  <text x="290" y="405" fill="#22c55e" font-size="10">Zero</text>
  <text x="370" y="405" fill="#f59e0b" font-size="10">At maturity</text>
  <text x="480" y="405" fill="#94a3b8" font-size="10">$100</text>

  <text x="60" y="425" fill="#e2e8f0" font-size="10">CDs</text>
  <text x="210" y="425" fill="#22c55e" font-size="10">4.5%</text>
  <text x="290" y="425" fill="#22c55e" font-size="10">Zero</text>
  <text x="370" y="425" fill="#ef4444" font-size="10">At maturity</text>
  <text x="480" y="425" fill="#94a3b8" font-size="10">$500</text>

  <text x="60" y="445" fill="#e2e8f0" font-size="10">I-Bonds</text>
  <text x="210" y="445" fill="#22c55e" font-size="10">4.3%</text>
  <text x="290" y="445" fill="#22c55e" font-size="10">Zero</text>
  <text x="370" y="445" fill="#ef4444" font-size="10">1 year lock</text>
  <text x="480" y="445" fill="#94a3b8" font-size="10">$25+</text>
</svg>
