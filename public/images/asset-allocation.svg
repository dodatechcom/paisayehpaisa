<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" width="760" height="480">
  <rect width="760" height="480" fill="#1a1d23" rx="8"/>
  <text x="380" y="26" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">Asset Allocation by Age (20s to 50s)</text>

  <!-- Age brackets -->
  <rect x="40" y="50" width="155" height="170" fill="#1e293b" rx="6"/>
  <rect x="40" y="50" width="155" height="28" fill="#22c55e" rx="6"/>
  <rect x="40" y="70" width="155" height="8" fill="#22c55e"/>
  <text x="117" y="69" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">20s-30s</text>
  <text x="117" y="98" fill="#22c55e" font-size="11" font-weight="600" text-anchor="middle">Aggressive</text>
  <text x="55" y="118" fill="#94a3b8" font-size="10">Stocks: 80-90%</text>
  <text x="55" y="134" fill="#94a3b8" font-size="10">Bonds: 10-15%</text>
  <text x="55" y="150" fill="#94a3b8" font-size="10">Cash: 0-5%</text>
  <text x="55" y="174" fill="#94a3b8" font-size="10">Time horizon: 30+ years</text>
  <text x="55" y="190" fill="#22c55e" font-size="10">Risk tolerance: High</text>
  <text x="55" y="210" fill="#94a3b8" font-size="10">Can recover from drops</text>

  <rect x="210" y="50" width="155" height="170" fill="#1e293b" rx="6"/>
  <rect x="210" y="50" width="155" height="28" fill="#6366f1" rx="6"/>
  <rect x="210" y="70" width="155" height="8" fill="#6366f1"/>
  <text x="287" y="69" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">30s-40s</text>
  <text x="287" y="98" fill="#6366f1" font-size="11" font-weight="600" text-anchor="middle">Growth</text>
  <text x="225" y="118" fill="#94a3b8" font-size="10">Stocks: 70-80%</text>
  <text x="225" y="134" fill="#94a3b8" font-size="10">Bonds: 15-20%</text>
  <text x="225" y="150" fill="#94a3b8" font-size="10">Cash: 5%</text>
  <text x="225" y="174" fill="#94a3b8" font-size="10">Time horizon: 20-30 years</text>
  <text x="225" y="190" fill="#6366f1" font-size="10">Risk tolerance: Medium-High</text>
  <text x="225" y="210" fill="#94a3b8" font-size="10">Start adding bonds</text>

  <rect x="380" y="50" width="155" height="170" fill="#1e293b" rx="6"/>
  <rect x="380" y="50" width="155" height="28" fill="#d97706" rx="6"/>
  <rect x="380" y="70" width="155" height="8" fill="#d97706"/>
  <text x="457" y="69" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">40s-50s</text>
  <text x="457" y="98" fill="#d97706" font-size="11" font-weight="600" text-anchor="middle">Balanced</text>
  <text x="395" y="118" fill="#94a3b8" font-size="10">Stocks: 55-65%</text>
  <text x="395" y="134" fill="#94a3b8" font-size="10">Bonds: 25-30%</text>
  <text x="395" y="150" fill="#94a3b8" font-size="10">Cash: 5-10%</text>
  <text x="395" y="174" fill="#94a3b8" font-size="10">Time horizon: 10-20 years</text>
  <text x="395" y="190" fill="#d97706" font-size="10">Risk tolerance: Medium</text>
  <text x="395" y="210" fill="#94a3b8" font-size="10">Protect gains, grow steadily</text>

  <rect x="550" y="50" width="170" height="170" fill="#1e293b" rx="6"/>
  <rect x="550" y="50" width="170" height="28" fill="#ef4444" rx="6"/>
  <rect x="550" y="70" width="170" height="8" fill="#ef4444"/>
  <text x="635" y="69" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">50s-60s+</text>
  <text x="635" y="98" fill="#ef4444" font-size="11" font-weight="600" text-anchor="middle">Conservative</text>
  <text x="565" y="118" fill="#94a3b8" font-size="10">Stocks: 40-50%</text>
  <text x="565" y="134" fill="#94a3b8" font-size="10">Bonds: 35-40%</text>
  <text x="565" y="150" fill="#94a3b8" font-size="10">Cash: 10-15%</text>
  <text x="565" y="174" fill="#94a3b8" font-size="10">Time horizon: 5-10 years</text>
  <text x="565" y="190" fill="#ef4444" font-size="10">Risk tolerance: Low-Medium</text>
  <text x="565" y="210" fill="#94a3b8" font-size="10">Preserve wealth, generate income</text>

  <!-- Bottom section: rule of thumb -->
  <rect x="40" y="240" width="680" height="100" fill="#1e293b" rx="6"/>
  <text x="380" y="265" fill="#e2e8f0" font-size="14" font-weight="700" text-anchor="middle">The Rule of Thumb</text>
  <text x="380" y="290" fill="#94a3b8" font-size="11" text-anchor="middle">Bond allocation = Your age. Stock allocation = 100 minus your age.</text>
  <text x="380" y="310" fill="#94a3b8" font-size="11" text-anchor="middle">Age 30: 70% stocks / 30% bonds | Age 50: 50% stocks / 50% bonds</text>
  <text x="380" y="330" fill="#fbbf24" font-size="11" text-anchor="middle">This is a guideline, not a rule. Adjust based on your risk tolerance and goals.</text>

  <!-- Sample portfolios -->
  <rect x="40" y="355" width="330" height="110" fill="#1e293b" rx="6"/>
  <text x="205" y="378" fill="#22c55e" font-size="12" font-weight="700" text-anchor="middle">Sample: Age 30 Portfolio</text>
  <text x="55" y="400" fill="#94a3b8" font-size="10">70% VTI (U.S. stocks)</text>
  <text x="55" y="416" fill="#94a3b8" font-size="10">15% VXUS (international stocks)</text>
  <text x="55" y="432" fill="#94a3b8" font-size="10">10% BND (bonds)</text>
  <text x="55" y="448" fill="#94a3b8" font-size="10">5% SCHP (TIPS inflation protection)</text>

  <rect x="390" y="355" width="330" height="110" fill="#1e293b" rx="6"/>
  <text x="555" y="378" fill="#ef4444" font-size="12" font-weight="700" text-anchor="middle">Sample: Age 55 Portfolio</text>
  <text x="405" y="400" fill="#94a3b8" font-size="10">45% VTI (U.S. stocks)</text>
  <text x="405" y="416" fill="#94a3b8" font-size="10">10% VXUS (international stocks)</text>
  <text x="405" y="432" fill="#94a3b8" font-size="10">30% BND (bonds)</text>
  <text x="405" y="448" fill="#94a3b8" font-size="10">15% SCHP + cash (stability)</text>
</svg>
